<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cory Settings</title>
  <style>
    /* ==========================================================================
       DESIGN TOKENS (from Cory Chatbox)
       ========================================================================== */
    :root {
      --cory-green-900: #0f3d2e;
      --cory-green-700: #1b5e47;
      --cory-green-500: #2d8a6b;
      --cory-green-300: #b8dcc9;
      --cory-green-100: #e8f3ed;

      --cory-text-primary: #1a1a1a;
      --cory-text-secondary: #4a4a4a;
      --cory-text-muted: #6b6b6b;
      --cory-text-on-green: #0f3d2e;

      --cory-border-soft: rgba(0, 0, 0, 0.06);
      
      --cory-radius-card: 28px;
      --cory-radius-bubble: 16px;
      --cory-radius-input: 999px;

      --cory-shadow-card: 0 20px 60px -10px rgba(0, 0, 0, 0.25),
                          0 4px 16px -4px rgba(0, 0, 0, 0.1);

      --cory-font-display: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
      --cory-font-body: 'Inter', 'Segoe UI', system-ui, sans-serif;

      --cory-ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ==========================================================================
       RESET / BASE
       ========================================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 420px;
      font-family: var(--cory-font-body);
      color: var(--cory-text-primary);
      background: #fff;
    }

    /* ==========================================================================
       POPUP CARD
       ========================================================================== */
    .cory-popup {
      width: 100%;
      background: #fff;
      border-radius: var(--cory-radius-card);
      box-shadow: var(--cory-shadow-card);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ==========================================================================
       HEADER
       ========================================================================== */
    .cory-popup-header {
      padding: 18px 22px;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, var(--cory-green-700), var(--cory-green-900));
      border-radius: var(--cory-radius-card) var(--cory-radius-card) 18px 18px;
      margin: 8px 8px 0;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .cory-popup-logo {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      display: block;
    }

    .cory-popup-title-section {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cory-popup-title {
      font-family: var(--cory-font-display);
      font-weight: 700;
      font-size: 20px;
      color: #fff;
      margin: 0;
      line-height: 1;
    }

    .cory-popup-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      margin: 0;
    }

    /* ==========================================================================
       CONTENT
       ========================================================================== */
    .cory-popup-content {
      padding: 22px 22px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cory-field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cory-field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--cory-text-on-green);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cory-field-label a {
      color: var(--cory-green-700);
      font-weight: 500;
      text-decoration: none;
      font-size: 11px;
      transition: opacity 0.2s;
    }

    .cory-field-label a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .cory-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 38px 12px 16px;
      background: #fff;
      border: 1.5px solid var(--cory-border-soft);
      border-radius: 12px;
      font-size: 14px;
      font-family: var(--cory-font-body);
      color: var(--cory-text-primary);
      outline: none;
      transition: border-color 0.2s var(--cory-ease), 
                  box-shadow 0.2s var(--cory-ease);
    }

    input:focus {
      border-color: var(--cory-green-500);
      box-shadow: 0 0 0 3px rgba(45, 138, 107, 0.15);
    }

    .cory-toggle-visibility {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--cory-text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s var(--cory-ease);
    }

    .cory-toggle-visibility:hover {
      color: var(--cory-green-700);
      background: rgba(45, 138, 107, 0.1);
    }

    .cory-save-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--cory-green-700), var(--cory-green-500));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--cory-font-body);
      cursor: pointer;
      transition: all 0.2s var(--cory-ease);
      box-shadow: 0 2px 8px rgba(45, 138, 107, 0.2);
    }

    .cory-save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(45, 138, 107, 0.3);
    }

    .cory-save-btn:active {
      transform: translateY(0);
    }

    .cory-status {
      margin: 0;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      animation: slideIn 0.2s var(--cory-ease);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cory-status.success {
      background: var(--cory-green-100);
      color: var(--cory-text-on-green);
      border: 1px solid var(--cory-green-300);
    }

    .cory-status.error {
      background: #fce4e4;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }

    .cory-status.show {
      display: block;
    }

    .cory-key-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--cory-green-100);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--cory-text-on-green);
      border: 1px solid var(--cory-green-300);
    }

    .cory-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.2s;
    }

    .cory-status-dot.active {
      background: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
    }

    .cory-divider {
      border: none;
      border-top: 1px solid var(--cory-border-soft);
      margin: 0;
    }

    .cory-info-section {
      font-size: 12px;
      color: var(--cory-text-secondary);
    }

    .cory-info-section h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--cory-text-on-green);
      margin: 0 0 10px;
    }

    .cory-step {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: flex-start;
    }

    .cory-step-num {
      width: 20px;
      height: 20px;
      background: var(--cory-green-500);
      color: #fff;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .cory-step span {
      line-height: 1.5;
    }

    .cory-step strong {
      font-weight: 600;
      color: var(--cory-text-primary);
    }
  </style>
</head>

  <!-- POPUP CARD -->
  <div class="cory-popup">
    <!-- HEADER -->
    <header class="cory-popup-header">
      <svg class="cory-popup-logo" role="img" aria-label="Cory logo">
        <use href="#cory-logo"/>
      </svg>
      <div class="cory-popup-title-section">
        <h1 class="cory-popup-title">Cory</h1>
        <p class="cory-popup-subtitle">API Configuration</p>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="cory-popup-content">
      <!-- API Key Field -->
      <div class="cory-field-group">
        <label class="cory-field-label">
          <span>Groq API Key</span>
          <a href="https://console.groq.com/keys" target="_blank">Get a key →</a>
        </label>
        <div class="cory-input-wrapper">
          <input 
            type="password" 
            id="api-key-input" 
            placeholder="gsk_..."
            autocomplete="off" 
          />
          <button class="cory-toggle-visibility" id="toggle-vis" title="Show/hide key">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Save Button -->
      <button class="cory-save-btn" id="save-btn">Save API Key</button>

      <!-- Status Messages -->
      <div class="cory-status" id="status-msg"></div>

      <!-- Key Status -->
      <div class="cory-key-status">
        <div class="cory-status-dot" id="key-dot"></div>
        <span id="key-status-text">No API key saved</span>
      </div>

      <!-- Divider -->
      <hr class="cory-divider" />

      <!-- Help Section -->
      <div class="cory-info-section">
        <h3>How to use Cory</h3>
        
        <div class="cory-step">
          <div class="cory-step-num">1</div>
          <span>Add your Groq API key above (stored locally in your browser)</span>
        </div>

        <div class="cory-step">
          <div class="cory-step-num">2</div>
          <span>Click the <strong>Cory</strong> button in the bottom-right corner</span>
        </div>

        <div class="cory-step">
          <div class="cory-step-num">3</div>
          <span>Ask anything you'd like help with!</span>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
